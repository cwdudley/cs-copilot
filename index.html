<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuccessCOACHING</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-y: auto;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(9, 9, 11, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #18181b;
      z-index: 100;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3f3f46;
      transition: background 0.3s;
    }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a1a1aa;
    }

    /* ── Main view ────────────────────────────────────────────────────────── */
    .main-view {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 80px 24px 40px;
    }

    /* ── Orb ──────────────────────────────────────────────────────────────── */
    .orb-wrapper {
      position: relative;
      width: 180px; height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(99, 102, 241, 0.15);
    }
    .orb-ring-1 { width: 180px; height: 180px; }
    .orb-ring-2 { width: 220px; height: 220px; }
    .orb-ring-3 { width: 260px; height: 260px; }

    .orb {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #818cf8, #4f46e5 60%, #1e1b4b);
      box-shadow: 0 0 40px rgba(79, 70, 229, 0.35);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      position: relative;
      z-index: 1;
    }

    /* ── Speaking states ──────────────────────────────────────────────────── */
    body.agent-speaking .orb {
      box-shadow: 0 0 60px rgba(99, 102, 241, 0.7), 0 0 100px rgba(99, 102, 241, 0.3);
      animation: pulse-agent 1.2s ease-in-out infinite;
    }
    body.agent-speaking .orb-ring {
      animation: expand-ring 1.8s ease-out infinite;
    }
    body.agent-speaking .orb-ring-2 { animation-delay: 0.3s; }
    body.agent-speaking .orb-ring-3 { animation-delay: 0.6s; }

    body.user-speaking .orb {
      box-shadow: 0 0 50px rgba(34, 197, 94, 0.6), 0 0 80px rgba(34, 197, 94, 0.2);
      background: radial-gradient(circle at 35% 35%, #86efac, #22c55e 60%, #14532d);
      animation: pulse-user 0.8s ease-in-out infinite;
    }

    @keyframes pulse-agent {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }
    @keyframes pulse-user {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.04); }
    }
    @keyframes expand-ring {
      0%   { opacity: 0.4; transform: scale(1); }
      100% { opacity: 0;   transform: scale(1.25); }
    }

    /* ── Status ───────────────────────────────────────────────────────────── */
    .status {
      font-size: 15px;
      color: #71717a;
      letter-spacing: 0.02em;
      min-height: 22px;
      transition: color 0.3s;
    }
    body.agent-speaking .status { color: #818cf8; }
    body.user-speaking  .status { color: #22c55e; }
    body.connected      .status { color: #a1a1aa; }

    /* ── Transcript ───────────────────────────────────────────────────────── */
    .transcript {
      width: 100%;
      max-width: 560px;
      min-height: 60px;
      max-height: 200px;
      overflow-y: auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: none;
    }
    .transcript::-webkit-scrollbar { display: none; }

    .transcript-line {
      font-size: 14px;
      line-height: 1.5;
      color: #52525b;
      transition: color 0.4s;
    }
    .transcript-line.agent  { color: #a1a1aa; }
    .transcript-line.user   { color: #6366f1; text-align: right; }
    .transcript-line.system { color: #3f3f46; font-style: italic; }
    .transcript-line.latest { color: #e4e4e7; }

    /* ── Connect button ───────────────────────────────────────────────────── */
    .connect-btn {
      padding: 11px 28px;
      border-radius: 8px;
      border: 1px solid #27272a;
      background: #18181b;
      color: #a1a1aa;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }
    .connect-btn:hover             { background: #27272a; color: #fafafa; }
    .connect-btn.connected         { border-color: #dc2626; color: #ef4444; }
    .connect-btn.connected:hover   { background: #1c0a0a; }
    .connect-btn:disabled          { opacity: 0.4; cursor: not-allowed; }

    /* ── Footer ───────────────────────────────────────────────────────────── */
    footer {
      font-size: 12px;
      color: #27272a;
      padding-bottom: 20px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-dot" id="statusDot"></div>
    <h1>SuccessCOACHING</h1>
  </header>

  <div class="main-view">

    <div class="orb-wrapper">
      <div class="orb-ring orb-ring-1"></div>
      <div class="orb-ring orb-ring-2"></div>
      <div class="orb-ring orb-ring-3"></div>
      <div class="orb" id="orb"></div>
    </div>

    <p class="status" id="status">Ready</p>

    <div class="transcript" id="transcript"></div>

    <button class="connect-btn" id="connectBtn" onclick="toggleConnect()">Connect</button>

  </div>

  <footer>Powered by SuccessCOACHING · Groq</footer>

  <script>
    let room = null;
    let connected = false;

    const statusEl     = document.getElementById("status");
    const connectBtn   = document.getElementById("connectBtn");
    const transcriptEl = document.getElementById("transcript");
    const statusDot    = document.getElementById("statusDot");

    // ── UI helpers ─────────────────────────────────────────────────────────

    function setStatus(text, state) {
      statusEl.textContent = text;
      document.body.className = state || "";
      statusDot.style.background =
        state === "agent-speaking" ? "#818cf8"
        : state === "user-speaking" ? "#22c55e"
        : state === "connected"     ? "#22c55e"
        : "#3f3f46";
    }

    function addTranscript(text, role) {
      transcriptEl.querySelectorAll(".latest").forEach(el => el.classList.remove("latest"));
      const line = document.createElement("div");
      line.className = `transcript-line ${role} latest`;
      line.textContent = text;
      transcriptEl.appendChild(line);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
      while (transcriptEl.children.length > 30) transcriptEl.removeChild(transcriptEl.firstChild);
    }

    // ── Room ───────────────────────────────────────────────────────────────

    async function toggleConnect() {
      if (connected) {
        await disconnect();
      } else {
        await connect();
      }
    }

    async function connect() {
      connectBtn.disabled = true;
      setStatus("Connecting…");

      try {
        const res = await fetch("/token");
        const { token, url } = await res.json();

        room = new LivekitClient.Room({ adaptiveStream: true, dynacast: true });

        room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
          if (track.kind === LivekitClient.Track.Kind.Audio) {
            const el = track.attach();
            el.style.display = "none";
            document.body.appendChild(el);
          }
        });

        room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, (speakers) => {
          const localId = room.localParticipant.identity;
          const agentSpeaking = speakers.some(s => s.identity !== localId);
          const userSpeaking  = speakers.some(s => s.identity === localId);
          if      (agentSpeaking) setStatus("Speaking…", "agent-speaking");
          else if (userSpeaking)  setStatus("Listening…", "user-speaking");
          else                    setStatus("Connected", "connected");
        });

        // Transcription streams
        const _recent = new Map();
        const DEDUPE_MS = 4000;

        room.registerTextStreamHandler("lk.transcription", async (reader, participantInfo) => {
          try {
            const text = (await reader.readAll() || "").trim();
            if (!text) return;

            const localId = room.localParticipant.identity;
            const role = participantInfo?.identity === localId ? "user" : "agent";

            const key = `${role}::${text}`;
            const now = Date.now();
            if (_recent.has(key) && now - _recent.get(key) < DEDUPE_MS) return;
            _recent.set(key, now);
            for (const [k, ts] of _recent) {
              if (now - ts > DEDUPE_MS * 2) _recent.delete(k);
            }

            addTranscript(text, role);
          } catch (err) {
            console.error("Transcription stream error:", err);
          }
        });

        room.on(LivekitClient.RoomEvent.Disconnected, () => {
          setStatus("Disconnected");
          connectBtn.textContent = "Connect";
          connectBtn.classList.remove("connected");
          connectBtn.disabled = false;
          connected = false;
          room = null;
        });

        await room.connect(url, token);
        await room.localParticipant.setMicrophoneEnabled(true);

        connected = true;
        connectBtn.textContent = "Disconnect";
        connectBtn.classList.add("connected");
        connectBtn.disabled = false;
        setStatus("Connected", "connected");

      } catch (err) {
        console.error(err);
        setStatus("Connection failed");
        connectBtn.disabled = false;
      }
    }

    async function disconnect() {
      if (room) {
        await room.disconnect();
        room = null;
      }
      connected = false;
      connectBtn.textContent = "Connect";
      connectBtn.classList.remove("connected");
      setStatus("Ready");
    }
  </script>
</body>
</html>
